<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de eventos</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/components/navbar.css">
    <link rel="stylesheet" href="../css/components/cards.css">
    <link rel="stylesheet" href="../css/components/forms.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <a href="#" class="logo">Adda</a>
                <button class="menu-btn" id="menuBtn">☰</button>
                <ul class="nav-links" id="navLinks">
                    <li class="nav-visitante"><a href="pages/login.html">Iniciar sesión</a></li>
                    <li><a href="../index.html">Eventos</a></li>
                    <li class="nav-usuario"><a href="pages/calendar.html">Agenda</a></li>
                    <li class="nav-centro"><a href="">Gestión de eventos</a></li>
                    <li class="nav-admin"><a href="pages/centros.html">Centros</a></li>
                    <li class="nav-sesion"><a href="#" id="cerrarSesion">Cerrar sesión</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <h1>Gestión de eventos</h1>
        <div class="forms-container" id="formContainer">
            <form class="form">
                <input type="text" id="eventName" placeholder="Ingrese el titulo del evento">
                <input type="text" id="eventCat" placeholder="Ingrese la categoria del evento">
                <input type="text" id="eventDir" placeholder="Ingrese la ubicación del evento">
                <input type="datetime-local" id="eventFechaHora" placeholder="Ingrese la fecha y hora del evento">
                <textarea name="eventDesc" id="eventDesc"></textarea>
                <button class="button" id="submitButton">Crear evento</button>
            </form>
        </div>
        <div id="eventsContainer" class="cards-container">

        </div>

    </main>

    <div class="overlay"></div>
    
<script src="../js/config.js"></script>
<script src="../js/protect.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/eventos.js"></script>
</body>
</html>
