    <header>
        <nav>
            <div class="nav-container">
                <a href="#" class="logo">Adda</a>
                <button class="menu-btn" id="menuBtn">☰</button>

    <main>
        <h1>Gestión de centros culturales</h1>
        <button id="agregarButton">Agregar centro</button>
        <div class="forms-container" id="formContainer">
            <form>
                <input type="text" id="centerName" placeholder="Ingrese el nombre del centro">
                <input type="text" id="centerDir" placeholder="Ingrese la ubicación del centro">
                <textarea name="centerDesc" id="centerDesc"></textarea>
                <input type="text" id="centerResp" placeholder="Ingrese el ID del responsable del centro">
                <button id="submitButton">Crear centro</button>
            </form>
        </div>

        <div id="centrosContainer">

        </div>

    </main>

    <div class="overlay"></div>
